<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Watchlist Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="{{ url_for('static', filename='style.css') }}"
      rel="stylesheet"
    />
    <link rel="manifest" href="/static/manifest.json" />

    <meta name="theme-color" content="#000000" />

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/static/sw.js")
          .then(() => console.log("Service Worker Registered"));
      }
    </script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
      <div class="container">
        <!-- Brand -->
        <a class="navbar-brand fw-bold text-primary" href="/">🎬 MyWatchlist</a>

        <!-- Mobile toggle -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <!-- Backup link -->
            <li class="nav-item">
              <a class="nav-link fw-medium" href="/backup"> 📦 Backup </a>
            </li>

            <!-- Add movie -->
            <li class="nav-item">
              <a class="btn btn-primary ms-lg-2" href="/addpage">
                + Add Movie
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="mb-3 d-flex justify-content-end gap-2">
        <button
          class="btn btn-outline-primary"
          data-bs-toggle="collapse"
          data-bs-target="#searchCollapse"
          onclick="toggleText(this)"
        >
          🔍 Show Search
        </button>
      </div>
      <div class="collapse" id="searchCollapse">
        <div class="search-container">
          <div class="row g-3">
            <div class="col-md-5">
              <input
                type="text"
                id="searchBox"
                class="form-control form-control-lg"
                placeholder="Search by name or tag..."
              />
            </div>

            <!-- Status dropdown -->
            <div class="col-md-4">
              <div class="dropdown w-100">
                <button
                  class="btn btn-outline-secondary btn-lg dropdown-toggle w-100 text-start"
                  type="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  id="statusDropdownBtn"
                >
                  All Status
                </button>

                <ul class="dropdown-menu w-100 px-3">
                  <li class="form-check">
                    <input
                      class="form-check-input status-checkbox"
                      type="checkbox"
                      value="watching"
                      id="statusWatching"
                    />
                    <label class="form-check-label" for="statusWatching"
                      >Watching</label
                    >
                  </li>
                  <li class="form-check">
                    <input
                      class="form-check-input status-checkbox"
                      type="checkbox"
                      value="completed"
                      id="statusCompleted"
                    />
                    <label class="form-check-label" for="statusCompleted"
                      >Completed</label
                    >
                  </li>
                  <li class="form-check">
                    <input
                      class="form-check-input status-checkbox"
                      type="checkbox"
                      value="to watch"
                      id="statusPlanned"
                    />
                    <label class="form-check-label" for="statusPlanned"
                      >To Watch</label
                    >
                  </li>
                  <li class="form-check">
                    <input
                      class="form-check-input status-checkbox"
                      type="checkbox"
                      value="cancelled"
                      id="statusDropped"
                    />
                    <label class="form-check-label" for="statusDropped"
                      >Cancelled</label
                    >
                  </li>
                </ul>
              </div>
            </div>

            <div class="col-md-3 d-flex gap-2">
              <button class="btn btn-success flex-grow-1" onclick="search(1)">
                Search
              </button>
              <button
                class="btn btn-outline-secondary btn-secondary"
                onclick="clearSearch()"
              >
                Clear
              </button>
            </div>
          </div>
          <div class="row">
            <div class="col-md-3 mt-3 form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="toggleDetailsCheckbox"
              />
              <label
                class="form-check-label small text-muted"
                for="toggleDetailsCheckbox"
                >Show extended details</label
              >
            </div>
            <div class="col-md-9">
              <button
                class="btn mt-3 btn-warning flex-grow-1"
                onclick="hideCancelledAndCompleted(1)"
              >
                Hide Cancelled and Completed Movies
              </button>
            </div>
          </div>
        </div>
      </div>
      <h5 class="fw-bold mb-3">Recently Added</h5>
      <div
        id="results"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"
      ></div>

      <div id="pagination" class="d-flex justify-content-center py-5"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='add.js') }}"></script>
    <script src="{{ url_for('static', filename='edit.js') }}"></script>

    <script>
      function toggleText(btn) {
        setTimeout(() => {
          const el = document.getElementById("searchCollapse");
          if (el.classList.contains("show")) {
            btn.innerText = "🔍 Hide Search";
          } else {
            btn.innerText = "🔍 Show Search";
          }
        }, 200);
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        console.log("Page loaded, initializing...");
        const defaultStatuses = ["watching", "to watch"];

        document.querySelectorAll(".status-checkbox").forEach((cb) => {
          if (defaultStatuses.includes(cb.value)) {
            cb.checked = true;
          }
        });

        // Update dropdown button text
        updateStatusDropdownText();

        // Optional: trigger initial search automatically
        search(1);
      });
    </script>
  </body>
</html>
